<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Business Simulation Platform</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>Administrator Portal</h1>
        <p>Business Simulation Platform - Control Center</p>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autofocus>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <button type="submit" class="btn btn-primary btn-block">Login as Administrator</button>
      </form>
      
      <div class="login-info">
        <h3>Administrator Access:</h3>
        <p><strong>Username:</strong> admin</p>
        <p><strong>Password:</strong> admin123</p>
        <hr style="margin: 15px 0; border: none; border-top: 1px solid #e1e8ed;">
        <p style="font-size: 12px; color: #888;">Teams should login at their respective ports (3000-3008)</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      
      errorMessage.textContent = '';
      
      // Admin must login with admin username
      if (username !== 'admin') {
        errorMessage.textContent = 'This is the administrator portal. Teams should login at their respective ports.';
        return;
      }
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          if (data.role === 'admin') {
            window.location.href = '/admin';
          } else {
            errorMessage.textContent = 'This is the administrator portal only.';
          }
        } else {
          errorMessage.textContent = data.error || 'Login failed';
        }
      } catch (error) {
        errorMessage.textContent = 'Connection error. Please try again.';
        console.error('Login error:', error);
      }
    });

    // Check if already logged in
    async function checkSession() {
      try {
        const response = await fetch('/api/auth/session');
        const data = await response.json();
        
        if (data.authenticated && data.role === 'admin') {
          window.location.href = '/admin';
        }
      } catch (error) {
        console.error('Session check error:', error);
      }
    }

    checkSession();
  </script>
</body>
</html>
